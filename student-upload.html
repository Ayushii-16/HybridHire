<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Resumes | HybridHire AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Inter, sans-serif;
            background: #f8fafc;
        }

        .upload-box {
            border: 2px dashed #3B82F6;
            transition: .3s;
        }

        .upload-box:hover {
            background: #eff6ff;
            border-color: #2563eb;
        }

        .file-item {
            transition: .2s;
        }

        .file-item:hover {
            background: #f3f4f6;
        }
    </style>

</head>

<body>

    <div class="max-w-6xl mx-auto p-10">

        <div class="flex justify-between items-center mb-8">

            <div>
                <h1 class="text-3xl font-bold text-gray-800">
                    Upload Resumes
                </h1>

                <p class="text-gray-500 mt-1">
                    Upload multiple resumes for AI screening
                </p>
            </div>

            <a href="student.html" class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                ← Dashboard
            </a>

        </div>

        <div class="grid lg:grid-cols-3 gap-8">

            <!-- LEFT -->

            <div class="lg:col-span-2">

                <div class="upload-box rounded-xl p-10 text-center bg-white">

                    <span class="text-6xl">📄</span>

                    <h2 class="text-2xl font-semibold mt-4">
                        Drag & Drop Resume Files
                    </h2>

                    <p class="text-gray-500 mt-2">
                        PDF, DOC, DOCX
                    </p>

                    <input type="file" id="resumeInput" multiple accept=".pdf,.doc,.docx" class="hidden">

                    <button onclick="document.getElementById('resumeInput').click()"
                        class="mt-6 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">

                        Browse Files

                    </button>

                </div>

                <div class="bg-white rounded-xl shadow mt-8 p-6">

                    <div class="flex justify-between items-center mb-5">

                        <h3 class="text-xl font-semibold">
                            Selected Files
                        </h3>

                        <span id="fileCount" class="text-sm text-gray-500">
                            0 Files
                        </span>

                    </div>

                    <div id="fileList" class="space-y-3">

                        <p class="text-gray-400">
                            No files selected.
                        </p>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div>

                <div class="bg-white rounded-xl shadow p-6">

                    <h3 class="text-xl font-semibold mb-5">
                        Upload Summary
                    </h3>

                    <div class="space-y-4">

                        <div class="flex justify-between">

                            <span>Total Files</span>

                            <span id="totalFiles">
                                0
                            </span>

                        </div>

                        <div class="flex justify-between">

                            <span>Ready</span>

                            <span id="readyFiles">
                                0
                            </span>

                        </div>

                        <div class="flex justify-between">

                            <span>Rejected</span>

                            <span id="rejectedFiles">
                                0
                            </span>

                        </div>

                    </div>

                    <button id="uploadBtn" class="w-full mt-8 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">

                        Upload & Analyze

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        const input = document.getElementById("resumeInput");

        const fileList = document.getElementById("fileList");

        const count = document.getElementById("fileCount");

        const total = document.getElementById("totalFiles");

        const ready = document.getElementById("readyFiles");

        const rejected = document.getElementById("rejectedFiles");

        const upload = document.getElementById("uploadBtn");

        let files = [];

        input.addEventListener("change", () => {

            files = [...input.files];

            render();

        });

        function render() {

            fileList.innerHTML = "";

            if (files.length == 0) {

                fileList.innerHTML = "<p class='text-gray-400'>No files selected.</p>";

            }

            files.forEach(file => {

                const div = document.createElement("div");

                div.className = "file-item flex justify-between items-center p-4 rounded-lg border";

                div.innerHTML = `

<div>

<div class="font-medium">${file.name}</div>

<div class="text-sm text-gray-500">

${(file.size / 1024).toFixed(1)} KB

</div>

</div>

<span class="text-green-600 font-semibold">

Ready

</span>

`;

                fileList.appendChild(div);

            });

            count.innerText = files.length + " Files";

            total.innerText = files.length;

            ready.innerText = files.length;

            rejected.innerText = 0;

        }

        upload.onclick = function () {

            if (files.length == 0) {

                alert("Select resume first.");

                return;

            }

            upload.innerHTML = "Uploading...";

            setTimeout(() => {

                upload.innerHTML = "Upload & Analyze";

                alert(files.length + " resumes uploaded successfully.\n\n(Backend will be connected later with Spring Boot)");

            }, 1500);

        }

    </script>
  <script src="student-upload.js"></script>
</body>

</html>
