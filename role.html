<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Role Selection - HybridHire AI</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="role.css"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#004395",
                        "surface-bright": "#f8f9ff",
                        "surface-variant": "#d3e4fe",
                        "tertiary-container": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#2170e4",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed": "#d8e2ff",
                        "on-tertiary-fixed-variant": "#444749",
                        "primary": "#000000",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface": "#f8f9ff",
                        "tertiary-fixed": "#e0e3e5",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed": "#dae2fd",
                        "warning-amber": "#d97706",
                        "secondary": "#0058be",
                        "on-surface-variant": "#45464d",
                        "inverse-surface": "#213145",
                        "on-primary-fixed": "#131b2e",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#3f465c",
                        "ai-blue": "#3b82f6",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-secondary-fixed": "#001a42",
                        "surface-tint": "#565e74",
                        "error-red": "#dc2626",
                        "surface-container-highest": "#d3e4fe",
                        "on-tertiary-fixed": "#191c1e",
                        "primary-container": "#131b2e",
                        "surface-dim": "#cbdbf5",
                        "on-background": "#0b1c30",
                        "inverse-primary": "#bec6e0",
                        "background": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#eaf1ff",
                        "outline-variant": "#c6c6cd",
                        "on-tertiary-container": "#818486",
                        "surface-blue": "#f8f9ff",
                        "primary-fixed-dim": "#bec6e0",
                        "success-green": "#16a34a",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#7c839b",
                        "on-surface": "#0b1c30",
                        "on-secondary-container": "#fefcff",
                        "tertiary": "#000000",
                        "outline": "#76777d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "stack-md": "16px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "stack-xl": "64px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Decorative AI Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-surface-variant blur-[100px] opacity-60"></div>
        <div class="absolute top-[60%] -right-[10%] w-[40%] h-[60%] rounded-full bg-secondary-fixed blur-[120px] opacity-40"></div>
    </div>
    
    <!-- Main Content Container -->
    <main class="w-full max-w-4xl px-margin-mobile md:px-margin-desktop z-10 flex flex-col items-center text-center">
        <!-- Header -->
        <header class="mb-stack-xl flex flex-col items-center">
            <div class="mb-stack-lg flex items-center gap-2">
                <span class="material-symbols-outlined text-4xl text-ai-blue" style="font-variation-settings: 'FILL' 1;">psychiatry</span>
                <span class="font-headline-sm text-headline-sm text-primary">HybridHire AI</span>
            </div>
            <h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary mb-stack-sm">
                How will you be using <span class="ai-gradient-text">HybridHire AI?</span>
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
                Select your primary role to tailor your experience with our intelligent hiring and career growth platform.
            </p>
        </header>
        
        <!-- Role Selection Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-3xl mb-stack-xl">
            <!-- Student Card -->
         <a href="register.html">  <button class="role-card group relative bg-surface-container-lowest rounded-xl p-stack-lg text-left overflow-hidden cursor-pointer shadow-[0px_4px_20px_rgba(15,23,42,0.05)] border-outline-variant/20 border" id="card-student" onclick="selectRole('student')">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent to-transparent group-hover:from-ai-blue/50 group-hover:to-ai-blue transition-all duration-300"></div>
                <div class="flex flex-col h-full justify-between">
                    <div>
                        <div class="card-icon h-16 w-16 rounded-full bg-surface-container flex items-center justify-center mb-stack-md text-on-surface-variant transition-colors">
                            <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0;">school</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-primary mb-stack-sm">Student</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">
                            Build your professional profile, discover tailored career paths, and match with ideal job opportunities using AI-driven insights.
                        </p>
                    </div>
                    <div class="mt-stack-lg flex items-center text-ai-blue font-label-md text-label-md opacity-0 group-hover:opacity-100 transition-opacity">
                        <span>CHOOSE THIS PATH</span>
                        <span class="material-symbols-outlined ml-2 text-sm">arrow_forward</span>
                    </div>
                </div>
            </button></a> 
            
            <!-- Recruiter / HR Card -->
       <a href="login.html">    <button class="role-card group relative bg-surface-container-lowest rounded-xl p-stack-lg text-left overflow-hidden cursor-pointer shadow-[0px_4px_20px_rgba(15,23,42,0.05)] border-outline-variant/20 border" id="card-recruiter" onclick="selectRole('recruiter')">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent to-transparent group-hover:from-ai-blue/50 group-hover:to-ai-blue transition-all duration-300"></div>
                <div class="flex flex-col h-full justify-between">
                    <div>
                        <div class="card-icon h-16 w-16 rounded-full bg-surface-container flex items-center justify-center mb-stack-md text-on-surface-variant transition-colors">
                            <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0;">manage_accounts</span>
                        </div>
                        <h2 class="font-headline-md text-headline-md text-primary mb-stack-sm">Recruiter / HR</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant">
                            Streamline talent acquisition, analyze candidate matching scores, and manage high-volume hiring with enterprise-grade AI tools.
                        </p>
                    </div>
                    <div class="mt-stack-lg flex items-center text-ai-blue font-label-md text-label-md opacity-0 group-hover:opacity-100 transition-opacity">
                        <span>CHOOSE THIS PATH</span>
                        <span class="material-symbols-outlined ml-2 text-sm">arrow_forward</span>
                    </div>
                </div>
            </button></a> 
        </div>
        
        <!-- Action Area -->
        <div class="w-full max-w-sm flex flex-col items-center">
            <button class="w-full h-12 bg-surface-tint text-on-primary rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 opacity-50 cursor-not-allowed transition-all" disabled="" id="btn-continue">
                Continue to Dashboard
                <span class="material-symbols-outlined text-lg">arrow_right_alt</span>
            </button>
            <p class="mt-stack-md font-body-sm text-body-sm text-on-surface-variant text-center">
                You can always change your primary role later in settings.
            </p>
        </div>
    </main>
    
    <!-- External JavaScript -->
    <script src="role.js"></script>
</body>
</html>
